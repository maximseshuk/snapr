version: 2

project_name: snapr

before:
  hooks:
    - go mod tidy

builds:
  - id: snapr
    main: ./cmd/snapr
    binary: snapr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: snapr
    formats: [tar.gz]
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

release:
  github:
    owner: maximseshuk
    name: snapr
  draft: false
  prerelease: auto
