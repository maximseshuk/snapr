version: '2'

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - nilerr
    - gosec
    - errorlint
    - copyloopvar
    - zerologlint

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    gosec:
      excludes:
        - G104
        - G304
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
          - bodyclose
      - path: cmd/
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/maximseshuk/snapr

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
  fix: false
