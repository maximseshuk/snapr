[changelog]
header = ""
body = """
{%- if version %}
{%- if previous and previous.version %}
## [{{ version }}]({{ self::remote_url() }}/compare/{{ previous.version }}...{{ version }}) ({{ timestamp | date(format="%Y-%m-%d") }})
{%- else %}
## [{{ version }}]({{ self::remote_url() }}/releases/tag/{{ version }}) ({{ timestamp | date(format="%Y-%m-%d") }})
{%- endif %}
{%- else %}
## Unreleased
{%- endif %}
{%- for group, commits in commits | group_by(attribute="group") %}

### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif -%}
{{ commit.message | split(pat="\n") | first | upper_first }}\
{%- if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }})){% endif %} ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))\
{%- if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}\
{%- if commit.breaking and commit.breaking_description and commit.breaking_description != commit.message %}

  {{ commit.breaking_description | indent(prefix="  ", first=false) }}
{%- endif %}
{%- endfor %}
{%- endfor %}
{%- if remote.contributors %}

### 🤝 Contributors

{% for contributor in remote.contributors -%}
{%- if contributor.username and not contributor.username is matching("\\[bot\\]$") %}
- @{{ contributor.username }}{% if contributor.is_first_time %} (first contribution){% endif %}
{%- endif -%}
{% endfor %}
{%- endif %}

{% macro remote_url() -%}
https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { field = "breaking", pattern = "true", group = "<!-- 00 -->⚠️ Breaking Changes" },
  { message = "^feat", group = "<!-- 01 -->🚀 Features" },
  { message = "^fix", group = "<!-- 02 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 03 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 04 -->🛠 Refactors" },
  { message = "^docs", group = "<!-- 05 -->📚 Documentation" },
  { message = "^style", group = "<!-- 06 -->🎨 Styles" },
  { message = "^test", group = "<!-- 07 -->🧪 Tests" },
  { message = "^build", group = "<!-- 08 -->🔨 Build" },
  { message = "^ci", group = "<!-- 09 -->⚙️ CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "<!-- 10 -->🏡 Chores" },
  { message = "^Merge", skip = true },
  { message = ".*", group = "<!-- 11 -->Other" },
]
filter_commits = false
topo_order = false
sort_commits = "oldest"
protect_breaking_commits = true

[remote.github]
owner = "maximseshuk"
repo = "snapr"
